name: Build

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cmake_flags: -DCMAKE_BUILD_TYPE=Release -DSINGULARITY_BUILD_EXAMPLES=ON
            artifact_path: build/VST3/**/ExamplePlugin.vst3
            artifact_name: ExamplePlugin-macOS
          - os: windows-latest
            cmake_flags: -G "Visual Studio 17 2022" -A x64 -DSINGULARITY_BUILD_EXAMPLES=ON
            artifact_path: build/VST3/Release/**/ExamplePlugin.vst3
            artifact_name: ExamplePlugin-Windows
          - os: ubuntu-latest
            cmake_flags: -DCMAKE_BUILD_TYPE=Release -DSINGULARITY_BUILD_EXAMPLES=ON
            artifact_path: build/VST3/**/ExamplePlugin.vst3
            artifact_name: ExamplePlugin-Linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev \
            libfreetype6-dev libfontconfig1-dev ninja-build

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('cmake/**/*.cmake', 'Example/CMakeLists.txt', 'CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Configure
        run: cmake -S . -B build ${{ matrix.cmake_flags }}

      - name: Build VST3
        run: cmake --build build --config Release --target ExamplePlugin_VST3 --parallel

      - name: Build Standalone APP
        run: cmake --build build --config Release --target ExamplePlugin_APP --parallel

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn

  release:
    name: Attach artifacts to release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip

