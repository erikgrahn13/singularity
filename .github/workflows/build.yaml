name: Build

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev \
            libfreetype6-dev libfontconfig1-dev ninja-build \
            libportal-dev libpipewire-0.3-dev

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            build/_deps
            build/CMakeCache.txt
            build/CMakeFiles
          key: deps-${{ runner.os }}-ninja-${{ hashFiles('cmake/**/*.cmake', 'examples/**/CMakeLists.txt', 'CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-ninja-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSINGULARITY_BUILD_EXAMPLES=ON

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Upload VST3 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Plugins-${{ runner.os }}
          path: |
            build/**/out/VST3/**/*.vst3
            build/**/out/APP/**/*
          if-no-files-found: warn

  release:
    name: Attach artifacts to release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip

